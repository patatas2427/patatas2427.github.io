<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width", initial-scale="1.0%">
        <title>Contact</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section class="contact-header">
            <nav>
                <a href="index.html"><img src="images/logo.png"></a>
                <div class="nav-links">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="interest.html">Interest</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </nav>
            <div class="contact">
                <h1 class="contact-headings">If you share the same goals as me, get in touch.<br>
                Let's begin this dream together.</h1>
                <form action="" class="form">
                    <input type="text" name="name" class="input" placeholder="Enter Your Name">
                    <input type="email" name="email" class="input" placeholder="Enter Your Email">
                    <textarea name="msg" id="msg" cols="30" rows="10" placeholder=
                    "Enter Your message here"></textarea>
                    <input type="submit" value="SEND" id="send">
                </form>
            </div>
        </section>

    </body>   
</html>
